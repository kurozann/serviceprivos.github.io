<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Antrean - Privos Service Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; overflow: hidden; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }
        .serving-pulse { position: relative; }
        .serving-pulse::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 4px solid #3b82f6; border-radius: 24px; animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header / Ticker -->
    <header class="gradient-bg py-6 px-10 flex justify-between items-center shadow-2xl border-b border-blue-900">
        <div class="flex items-center space-x-4">
            <div class="bg-white p-3 rounded-2xl">
                <i class="fas fa-motorcycle text-blue-700 text-3xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tight">Privos Service Motor</h1>
                <p class="text-blue-300 text-sm font-medium uppercase tracking-widest">Informasi Antrean Real-Time</p>
            </div>
        </div>
        <div class="text-right">
            <div id="clock" class="text-3xl font-bold">00:00:00</div>
            <div id="date" class="text-blue-300 text-sm">Kamis, 24 Oktober 2024</div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-8 p-8">
        <!-- Bagian Kiri: Sedang Dilayani (Fokus Utama) -->
        <div class="col-span-12 lg:col-span-5 flex flex-col space-y-6">
            <div class="card-glass rounded-[40px] p-10 flex-1 flex flex-col justify-center items-center text-center serving-pulse">
                <h2 class="text-blue-400 font-bold uppercase tracking-widest text-2xl mb-4">Sedang Dilayani</h2>
                <div id="currentNumber" class="text-[14rem] font-black leading-none text-white drop-shadow-[0_0_50px_rgba(59,130,246,0.5)]">
                    --
                </div>
                <div class="mt-8 space-y-2">
                    <div id="currentName" class="text-4xl font-bold">Menunggu Pelanggan</div>
                    <div id="currentPlate" class="text-2xl text-blue-300 bg-blue-900/40 px-6 py-2 rounded-full inline-block">--</div>
                </div>
            </div>

            <!-- Stats Ringkas -->
            <div class="grid grid-cols-2 gap-6">
                <div class="card-glass p-6 rounded-3xl flex items-center space-x-4">
                    <div class="bg-yellow-500/20 p-4 rounded-2xl"><i class="fas fa-clock text-yellow-500 text-2xl"></i></div>
                    <div>
                        <p class="text-gray-400 text-sm">Menunggu</p>
                        <h4 id="statWaiting" class="text-3xl font-bold">0</h4>
                    </div>
                </div>
                <div class="card-glass p-6 rounded-3xl flex items-center space-x-4">
                    <div class="bg-green-500/20 p-4 rounded-2xl"><i class="fas fa-check text-green-500 text-2xl"></i></div>
                    <div>
                        <p class="text-gray-400 text-sm">Selesai</p>
                        <h4 id="statDone" class="text-3xl font-bold">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bagian Kanan: Daftar Antrean Selanjutnya -->
        <div class="col-span-12 lg:col-span-7 card-glass rounded-[40px] overflow-hidden flex flex-col">
            <div class="p-8 border-b border-white/10 flex justify-between items-center">
                <h3 class="text-2xl font-bold"><i class="fas fa-list-ol mr-4 text-blue-500"></i>Antrean Selanjutnya</h3>
                <span class="bg-blue-600 px-4 py-1 rounded-full text-xs font-bold animate-pulse">LIVE</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <table class="w-full text-left">
                    <tbody id="queueList" class="divide-y divide-white/5">
                        <!-- Iterasi data antrean -->
                    </tbody>
                </table>
            </div>
            <!-- Footer Ticker -->
            <div class="bg-blue-900/20 p-4 text-center">
                <p class="text-blue-300 text-sm italic">"Kenyamanan dan Keamanan Kendaraan Anda Adalah Prioritas Kami"</p>
            </div>
        </div>
    </main>

    <script>
        function updateDisplay() {
            const queues = JSON.parse(localStorage.getItem('privos_queues')) || [];
            
            // Stats
            const waiting = queues.filter(q => q.status === 'Waiting');
            const done = queues.filter(q => q.status === 'Done');
            const current = queues.find(q => q.status === 'Serving');

            // Update UI Sedang Dilayani
            const numEl = document.getElementById('currentNumber');
            const nameEl = document.getElementById('currentName');
            const plateEl = document.getElementById('currentPlate');

            if (current) {
                numEl.innerText = current.ticket;
                nameEl.innerText = current.name;
                plateEl.innerText = current.plate;
                numEl.classList.add('text-blue-500');
            } else {
                numEl.innerText = "--";
                nameEl.innerText = "Menunggu Pelanggan";
                plateEl.innerText = "--";
                numEl.classList.remove('text-blue-500');
            }

            // Update Stats
            document.getElementById('statWaiting').innerText = waiting.length;
            document.getElementById('statDone').innerText = done.length;

            // Render List (Tampilkan 6 antrean menunggu berikutnya)
            const listEl = document.getElementById('queueList');
            listEl.innerHTML = waiting.slice(0, 6).map(q => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="px-8 py-6">
                        <span class="text-4xl font-black text-blue-400">${q.ticket}</span>
                    </td>
                    <td class="px-8 py-6">
                        <div class="text-2xl font-bold">${q.name}</div>
                        <div class="text-blue-300/60">${q.motor}</div>
                    </td>
                    <td class="px-8 py-6 text-right">
                        <span class="px-4 py-2 bg-yellow-500/10 text-yellow-500 rounded-xl text-sm font-bold border border-yellow-500/20">
                            MENUNGGU
                        </span>
                    </td>
                </tr>
            `).join('');

            if(waiting.length === 0) {
                listEl.innerHTML = `<tr><td colspan="3" class="text-center py-20 text-gray-500 text-xl">Belum ada antrean masuk</td></tr>`;
            }
        }

        // Clock & Date
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
        }

        // Sinkronisasi data setiap 1 detik
        setInterval(updateDisplay, 1000);
        setInterval(updateTime, 1000);
        
        window.onload = () => {
            updateDisplay();
            updateTime();
        };
    </script>
</body>
</html>
