<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin & Pendaftaran - Privos Service Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="min-h-screen">

    <header class="gradient-bg text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white p-2 rounded-xl"><i class="fas fa-motorcycle text-blue-600 text-xl"></i></div>
                <h1 class="text-lg font-bold">Privos Management</h1>
            </div>
            <nav class="flex space-x-2">
                <button onclick="switchTab('customer')" id="tab-customer" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800 transition-all">
                    <i class="fas fa-plus mr-2"></i>Daftar
                </button>
                <button onclick="switchTab('admin')" id="tab-admin" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800 transition-all">
                    <i class="fas fa-tasks mr-2"></i>Admin Panel
                </button>
                <a href="monitor.html" target="_blank" class="px-4 py-2 bg-yellow-500 text-blue-900 rounded-lg text-sm font-bold hover:bg-yellow-400 transition-all">
                    <i class="fas fa-desktop mr-2"></i>Buka Layar Monitor
                </a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Pendaftaran Section -->
        <section id="content-customer" class="tab-content max-w-2xl mx-auto">
            <div class="bg-white rounded-3xl shadow-xl p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Pendaftaran Pelanggan</h2>
                <form id="bookingForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="custName" required placeholder="Nama Pemilik" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="plateNumber" required placeholder="Nomor Polisi (Contoh: B 1234 ABC)" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <input type="text" id="motorType" required placeholder="Tipe Motor (Contoh: Vario 160)" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="serviceType" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Servis Rutin</option>
                        <option>Ganti Oli</option>
                        <option>Servis Besar</option>
                        <option>Lainnya</option>
                    </select>
                    <button type="submit" class="w-full py-4 gradient-bg text-white font-bold rounded-xl shadow-lg hover:scale-[1.02] transition-transform">
                        Ambil Nomor Antrean
                    </button>
                </form>
                <div id="successCard" class="hidden mt-6 bg-green-100 p-4 rounded-xl border border-green-200 text-center">
                    <p class="text-green-800 font-bold">Berhasil! Nomor Antrean Anda:</p>
                    <h3 id="displayTicket" class="text-4xl font-black text-green-600">--</h3>
                </div>
            </div>
        </section>

        <!-- Admin Section -->
        <section id="content-admin" class="tab-content hidden">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div class="p-6 bg-gray-800 text-white flex justify-between items-center">
                    <h2 class="text-xl font-bold">Kontrol Antrean</h2>
                    <button onclick="resetSystem()" class="text-xs bg-red-500 px-3 py-1 rounded-md hover:bg-red-600">Hapus Semua Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-xs font-bold uppercase text-gray-400">
                            <tr>
                                <th class="px-6 py-4">Tiket</th>
                                <th class="px-6 py-4">Pelanggan</th>
                                <th class="px-6 py-4">Layanan</th>
                                <th class="px-6 py-4">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="adminQueueList" class="divide-y divide-gray-100 text-sm">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3">
            <i id="toastIcon" class="fas fa-info-circle text-blue-400"></i>
            <span id="toastMsg">...</span>
        </div>
    </div>

    <script>
        let queues = JSON.parse(localStorage.getItem('privos_queues')) || [];

        window.onload = () => switchTab('customer');

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('bg-blue-800', 'ring-2', 'ring-blue-300'));
            const activeTab = document.getElementById(`tab-${tabId}`);
            if(activeTab) activeTab.classList.add('bg-blue-800', 'ring-2', 'ring-blue-300');
            renderData();
        }

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newQueue = {
                id: Date.now(),
                ticket: 'P' + (queues.length + 1).toString().padStart(3, '0'),
                name: document.getElementById('custName').value,
                plate: document.getElementById('plateNumber').value,
                motor: document.getElementById('motorType').value,
                service: document.getElementById('serviceType').value,
                status: 'Waiting',
                timestamp: new Date().toLocaleTimeString('id-ID')
            };
            queues.push(newQueue);
            saveData();
            document.getElementById('displayTicket').innerText = newQueue.ticket;
            document.getElementById('successCard').classList.remove('hidden');
            e.target.reset();
            showToast('Antrean Baru Berhasil!', 'fa-check');
        });

        function updateStatus(id, status) {
            if(status === 'Serving') {
                queues.forEach(q => { if(q.status === 'Serving') q.status = 'Done'; });
            }
            queues = queues.map(q => q.id === id ? {...q, status} : q);
            saveData();
            showToast(`Status: ${status}`, 'fa-sync');
        }

        function resetSystem() {
            if(confirm('Reset semua data hari ini?')) {
                queues = [];
                saveData();
            }
        }

        function renderData() {
            const adminList = document.getElementById('adminQueueList');
            if(!adminList) return;

            adminList.innerHTML = queues.slice().reverse().map(q => `
                <tr class="${q.status === 'Serving' ? 'bg-blue-50' : ''}">
                    <td class="px-6 py-4 font-bold text-blue-600">${q.ticket}</td>
                    <td class="px-6 py-4">
                        <div class="font-bold">${q.name}</div>
                        <div class="text-xs text-gray-500">${q.plate}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-xs font-medium">${q.motor}</div>
                        <div class="text-[10px] text-blue-500">${q.service}</div>
                    </td>
                    <td class="px-6 py-4 flex space-x-2">
                        ${q.status === 'Waiting' ? `
                            <button onclick="updateStatus(${q.id}, 'Serving')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs">Panggil</button>
                        ` : ''}
                        ${q.status === 'Serving' ? `
                            <button onclick="updateStatus(${q.id}, 'Done')" class="bg-green-600 text-white px-3 py-1 rounded text-xs">Selesai</button>
                        ` : ''}
                        <button onclick="updateStatus(${q.id}, 'Cancelled')" class="text-red-500 hover:text-red-700 text-xs">Batal</button>
                    </td>
                </tr>
            `).join('');
        }

        function saveData() {
            localStorage.setItem('privos_queues', JSON.stringify(queues));
            renderData();
        }

        function showToast(msg, icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').className = `fas ${icon} text-blue-400`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
